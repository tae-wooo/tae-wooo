name: Generate Potato Garden

on:
  schedule:
    - cron: "0 */12 * * *" # 12시간마다 실행 (리눅스 crontab 문법)
  workflow_dispatch: 
  push:
    branches:
      - main 

jobs:
  generate:
    permissions:
      contents: write 
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate-potato-garden
        uses: Yurifuchiwaki/github-contribution-potato@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: push potato.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
